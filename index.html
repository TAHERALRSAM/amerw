<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>مرسم أمير عايد | المعرض الاحترافي</title>
    
    <!-- Firebase SDKs -->
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-firestore-compat.js"></script>

    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700;900&display=swap" rel="stylesheet">
    
    <style>
        body { font-family: 'Tajawal', sans-serif; background-color: #050811; color: white; scroll-behavior: smooth; overflow-x: hidden; }
        .hero-section { background-image: linear-gradient(to bottom, rgba(5, 8, 17, 0.6), rgba(5, 8, 17, 0.98)), url('hero.jpg'); background-size: cover; background-position: center; min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; padding: 100px 20px; }
        .text-red-custom { color: #ef4444; }
        .bg-red-custom { background-color: #ef4444; }
        
        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.98); z-index: 2000; align-items: center; justify-content: center; padding: 10px; overflow-y: auto; }
        .modal-content { background: #0c0c0c; border: 1px solid #333; width: 100%; max-width: 950px; max-height: 95vh; border-radius: 28px; position: relative; overflow-y: auto; overflow-x: hidden; animation: zoomIn 0.3s ease; }
        
        /* زر الخروج الأحمر الثابت والمميز */
        .close-btn { position: absolute; top: 15px; left: 15px; background: #ef4444; color: white; width: 45px; height: 45px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: bold; z-index: 2100; cursor: pointer; border: 2px solid white; box-shadow: 0 0 20px rgba(239, 68, 68, 0.6); }
        
        #adminPanel, .delete-btn { display: none !important; }
        .glass-input { background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); border-radius: 12px; padding: 12px; width: 100%; outline: none; color: white; margin-bottom: 10px; text-align: right; }
        .name-glow { text-shadow: 0 0 40px rgba(239, 68, 68, 0.6); font-size: clamp(3.5rem, 12vw, 8.5rem); }
        
        .nav-bar { display: flex; align-items: center; justify-content: center; gap: 30px; padding: 15px; background: rgba(255,255,255,0.03); border-top: 1px solid rgba(255,255,255,0.1); }
        .nav-btn { background: #ef4444; color: white; width: 40px; height: 40px; border-radius: 10px; display: flex; align-items: center; justify-content: center; cursor: pointer; }
        
        .flash-box { background: rgba(239, 68, 68, 0.08); border: 2px solid #ef4444; cursor: pointer; }
        @keyframes zoomIn { from { transform: scale(0.95); opacity: 0; } to { transform: scale(1); opacity: 1; } }
    </style>
</head>
<body>

    <!-- Navbar -->
    <nav class="fixed w-full top-0 z-[150] bg-black/90 backdrop-blur-xl p-4 border-b border-white/5 flex justify-between items-center px-4">
        <div class="text-2xl font-black text-red-custom tracking-tighter">أمير عايد</div>
        <div class="flex gap-4 items-center">
            <button onclick="logout()" id="logoutBtn" style="display:none" class="text-[10px] text-red-500 font-black border border-red-500/30 px-3 py-1 rounded-lg">خروج</button>
            <button onclick="openOrderModal()" class="bg-red-custom text-white px-4 py-1.5 rounded-xl font-bold text-[10px] shadow-lg">طلب رسم خاص ✨</button>
        </div>
    </nav>

    <!-- Hero -->
    <header class="hero-section">
        <div data-aos="fade-up">
            <h1 class="font-black text-white name-glow leading-tight text-shadow">أمير <span class="text-red-custom">عايد</span></h1>
            <p class="text-lg md:text-2xl font-bold mb-10 italic bg-black/40 px-8 py-2 rounded-full inline-block mt-4 border border-white/5">فنٌ يملأ الفراغ.. ودقة تحاكي الواقع ✨</p>
            
            <!-- لوحة التحكم للمدير -->
            <div id="adminPanel" class="mb-10 bg-green-600/10 border border-green-600 p-6 rounded-[2.5rem] shadow-2xl">
                <p class="text-green-500 text-sm mb-4 font-bold italic">لوحة التحكم مفعلة يا طاهر، يمكنك النشر الآن:</p>
                <button onclick="document.getElementById('uploadModal').style.display='flex'" class="bg-green-600 text-white px-10 py-3 rounded-2xl font-black shadow-lg hover:bg-green-700 transition">➕ نشر لوحة أو مجموعة صور</button>
            </div>

            <div id="flash-sale-container"></div>
        </div>
    </header>

    <!-- المعرض -->
    <section class="max-w-7xl mx-auto px-6 py-20 text-right">
        <div id="filterButtons" class="flex flex-wrap justify-center gap-3 mb-16">
            <button id="btn-all" onclick="filterArt('all')" class="cat-btn bg-red-custom px-8 py-2.5 rounded-2xl font-black text-sm text-white shadow-xl">الكل</button>
        </div>

        <div id="dynamicGallery" class="grid grid-cols-2 md:grid-cols-4 lg:grid-cols-5 gap-6 text-center">
            <div class="col-span-full py-20 text-gray-600 animate-pulse font-bold italic text-lg">جاري جلب لوحاتك من السحابة...</div>
        </div>
    </section>

    <!-- المدخل السري -->
    <footer class="py-20 border-t border-white/5 text-center">
        <div id="loginEntry" class="flex items-center justify-center gap-2 text-gray-800 hover:text-red-900 transition cursor-pointer" onclick="document.getElementById('loginModal').style.display='flex'">
            <span class="w-8 h-8 border border-current rounded-full flex items-center justify-center font-bold">P</span>
            <span class="text-sm font-bold">طاهر</span>
        </div>
    </footer>

    <!-- Modal الرفع المطور -->
    <div id="uploadModal" class="modal">
        <div class="modal-content max-w-lg p-10 border-green-600 border-2">
            <div class="close-btn" onclick="this.parentElement.parentElement.style.display='none'">✕</div>
            <h2 class="text-2xl font-black text-green-500 mb-8 text-center underline">نشر أعمال جديدة</h2>
            <div id="batchStatus" class="hidden bg-blue-600 text-white p-3 text-[10px] text-center mb-6 rounded-xl font-bold animate-pulse"></div>
            
            <input type="text" id="artTitle" placeholder="عنوان اللوحة" class="glass-input">
            <input type="text" id="artCategory" placeholder="القسم (زيتي، روضات، جداريات، رصاص)" class="glass-input">
            <input type="text" id="artGroupName" placeholder="اسم المجموعة (اختياري للربط)" class="glass-input">
            <input type="text" id="artPrice" placeholder="السعر" class="glass-input">
            <input type="text" id="artSize" placeholder="القياس" class="glass-input">
            <textarea id="artDesc" placeholder="تفاصيل اللوحة" class="glass-input h-24"></textarea>
            
            <label class="block text-gray-500 text-xs mb-2 mr-2 italic">اختر صورة أو مجموعة صور للرفع:</label>
            <input type="file" id="artFiles" multiple class="block w-full text-xs text-gray-400 mb-8">
            
            <button onclick="handleBatchUpload()" id="upBtn" class="w-full bg-green-600 p-4 rounded-xl font-black text-lg shadow-xl shadow-green-600/20">بدء الرفع الآن</button>
        </div>
    </div>

    <!-- Modal عرض الصور -->
    <div id="imageModal" class="modal">
        <div class="modal-content shadow-2xl">
            <div class="close-btn" onclick="closeModal()">✕</div>
            <div class="flex flex-col md:flex-row">
                <div class="relative w-full md:w-3/5 bg-black h-[400px] md:h-[650px] flex items-center justify-center border-l border-white/5">
                    <img id="modal-img" src="" class="max-w-full max-h-full object-contain">
                    <div id="nav-controls" class="absolute bottom-0 left-0 w-full nav-bar hidden">
                        <div class="nav-btn" onclick="changeImage(1)">←</div>
                        <span id="img-counter" class="text-white font-bold text-xs tracking-widest"></span>
                        <div class="nav-btn" onclick="changeImage(-1)">→</div>
                    </div>
                </div>
                <div class="w-full md:w-2/5 p-10 text-right overflow-y-auto max-h-[450px] md:max-h-[650px]">
                    <h2 id="modal-title" class="text-3xl font-black text-red-custom mb-6 tracking-tight"></h2>
                    <p id="modal-desc" class="text-gray-300 text-sm leading-relaxed mb-8 pr-4 border-r-2 border-red-custom font-bold italic"></p>
                    <div id="info-box" class="bg-white/5 p-6 rounded-3xl space-y-4">
                        <p id="modal-size" class="text-white font-bold text-lg"></p>
                        <p id="modal-price" class="text-3xl font-black text-red-custom"></p>
                    </div>
                    <a id="wa-link" href="#" class="block w-full mt-10 bg-red-custom text-white text-center p-5 rounded-2xl font-black text-lg shadow-xl hover:bg-red-700 transition">تواصل واتساب</a>
                </div>
            </div>
        </div>
    </div>

    <!-- تسجيل الدخول -->
    <div id="loginModal" class="modal"><div class="modal-content max-w-sm p-10 text-center border-red-custom/50 border-2"><div class="close-btn" onclick="this.parentElement.parentElement.style.display='none'">✕</div><h2 class="text-xl font-black text-red-custom mb-6 italic tracking-widest">تـحـقـق</h2><input type="email" id="email" placeholder="البريد" class="glass-input"><input type="password" id="password" placeholder="كلمة السر" class="glass-input"><button onclick="login()" class="w-full bg-red-custom p-4 rounded-xl font-black mt-4 text-white shadow-lg">دخول</button></div></div>

    <script>
        // --- Firebase Config لـ ameer-5ad16 ---
        const firebaseConfig = {
            apiKey: "AIzaSyDPLdyIpzU-IAovzrWqvH-mJNneP8W2nOA",
            authDomain: "ameer-5ad16.firebaseapp.com",
            databaseURL: "https://ameer-5ad16-default-rtdb.firebaseio.com",
            projectId: "ameer-5ad16",
            storageBucket: "ameer-5ad16.firebasestorage.app",
            messagingSenderId: "819681497602",
            appId: "1:819681497602:web:ea755095b3a0c178dd8d1b",
            measurementId: "G-W3CWEX8SLH"
        };
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.firestore();

        const ADMIN_EMAIL = "taheralrsam100@gmail.com";
        const IMGBB_KEY = "2992948833d81d6dc8555d60cdd13431";
        const MY_PHONE = "9647829558820";

        let artworks = []; let currentViewerGroup = []; let currentIndex = 0;

        auth.onAuthStateChanged(user => {
            if (user && user.email.toLowerCase() === ADMIN_EMAIL.toLowerCase()) {
                document.getElementById('adminPanel').style.display = 'block';
                document.getElementById('logoutBtn').style.display = 'block';
                document.getElementById('loginEntry').style.display = 'none';
            }
        });

        async function login() {
            try {
                await auth.signInWithEmailAndPassword(document.getElementById('email').value, document.getElementById('password').value);
                location.reload();
            } catch(e) { alert("بيانات الدخول خاطئة!"); }
        }
        function logout() { auth.signOut(); location.reload(); }

        // --- وظيفة الرفع الجماعي الموثوقة مع حل مشكلة عدم الظهور ---
        async function handleBatchUpload() {
            const files = document.getElementById('artFiles').files;
            const title = document.getElementById('artTitle').value;
            const cat = document.getElementById('artCategory').value;
            const group = document.getElementById('artGroupName').value || title;

            if (files.length === 0 || !title || !cat) return alert("يرجى ملء البيانات الأساسية");
            if (!auth.currentUser) return alert("أنت غير مسجل دخول كمسؤول!");

            const upBtn = document.getElementById('upBtn');
            const status = document.getElementById('batchStatus');
            upBtn.disabled = true; status.classList.remove('hidden');

            try {
                for (let i = 0; i < files.length; i++) {
                    status.innerText = `جاري رفع صورة (${i + 1} من أصل ${files.length})...`;
                    const fd = new FormData(); fd.append("image", files[i]);
                    const res = await fetch(`https://api.imgbb.com/1/upload?key=${IMGBB_KEY}`, { method: "POST", body: fd });
                    const data = await res.json();
                    if (!data.success) throw new Error(data.error.message);

                    await db.collection('artworks').add({
                        title: files.length > 1 ? `${title} (${i+1})` : title,
                        category: cat, group: group,
                        price: document.getElementById('artPrice').value || "تواصل للتفاصيل",
                        size: document.getElementById('artSize').value || "غير محدد",
                        desc: document.getElementById('artDesc').value || "",
                        url: data.data.url, createdAt: firebase.firestore.FieldValue.serverTimestamp()
                    });
                }
                alert("✅ تم الرفع بنجاح!");
                window.location.href = window.location.href.split('?')[0] + "?t=" + Date.now();
            } catch (err) {
                alert("❌ فشل الرفع! السبب: " + err.message);
                upBtn.disabled = false;
                status.classList.add('hidden');
            }
        }

        async function loadData() {
            try {
                const snap = await db.collection('artworks').orderBy('createdAt', 'desc').get();
                artworks = snap.docs.map(doc => ({id: doc.id, ...doc.data()}));
                
                const filterDiv = document.getElementById('filterButtons');
                const cats = [...new Set(artworks.map(a => a.category))];
                filterDiv.innerHTML = `<button onclick="filterArt('all')" id="btn-all" class="cat-btn bg-red-custom px-8 py-2.5 rounded-2xl font-black text-sm text-white">الكل</button>`;
                cats.forEach(c => {
                    if(c) filterDiv.innerHTML += `<button onclick="filterArt('${c}')" class="cat-btn bg-white/5 px-8 py-2.5 rounded-2xl font-bold text-sm text-gray-400 hover:bg-white/10 transition">${c}</button>`;
                });
                renderGallery('all');
                renderFlashSale();
            } catch(e) { console.log("Error loading DB"); }
        }

        function renderGallery(cat) {
            const grid = document.getElementById('dynamicGallery'); grid.innerHTML = "";
            const filtered = cat === 'all' ? artworks : artworks.filter(a => a.category === cat);
            const isAdmin = auth.currentUser && auth.currentUser.email === ADMIN_EMAIL;

            filtered.forEach(art => {
                grid.innerHTML += `
                    <div class="glass-card rounded-[2.2rem] overflow-hidden group border border-white/5 hover:border-red-custom transition-all">
                        <img src="${art.url}" onclick="openWork('${art.id}')" class="w-full h-48 md:h-56 object-cover cursor-pointer hover:scale-105 transition-transform duration-500">
                        <div class="p-3 text-center">
                            <p class="text-[10px] font-bold text-gray-400">${art.title}</p>
                            <button onclick="deleteArt('${art.id}')" class="text-red-500 text-[8px] mt-2 underline font-black italic" style="display:${isAdmin?'inline-block':'none'}">حذف العمل</button>
                        </div>
                    </div>`;
            });
        }

        function openWork(id) {
            const art = artworks.find(a => a.id === id);
            currentViewerGroup = (art.group && art.group.trim() !== "") ? artworks.filter(a => a.group === art.group) : [art];
            currentIndex = currentViewerGroup.findIndex(a => a.id === id);
            updateModal();
            document.getElementById('imageModal').style.display = 'flex';
            document.body.style.overflow = 'hidden';
        }

        function updateModal() {
            const art = currentViewerGroup[currentIndex];
            document.getElementById('modal-img').src = art.url;
            document.getElementById('modal-title').innerText = art.title;
            
            let klisha = art.desc;
            if(!klisha) {
                if(art.category.includes("جدار")) klisha = "نحول جدرانكم الصامتة إلى لوحات تنبض بالحياة بدقة المنظور الهندسي.";
                else if(art.category.includes("رصاص")) klisha = "الرصاص.. لغة الظل والنور التي تخلد الملامح بواقعية فائقة.";
                else if(art.category.includes("روض")) klisha = "ألوان وبهجة لروضاتكم! ✨ حكايات خيالية مبهجة تحفز الخيال.";
                else klisha = "عمل فني احترافي بريشة الرسام أمير عايد.";
            }

            document.getElementById('modal-desc').innerText = klisha;
            document.getElementById('modal-size').innerText = art.size ? "📏 القياس: " + art.size : "";
            document.getElementById('modal-price').innerText = art.price ? "💰 السعر: " + art.price : "";
            document.getElementById('wa-link').href = `https://wa.me/${MY_PHONE}?text=${encodeURIComponent('أود الاستفسار عن لوحة: ' + art.title)}`;
            
            const nav = document.getElementById('nav-controls');
            if(currentViewerGroup.length > 1) {
                nav.className = "absolute bottom-0 left-0 w-full nav-bar flex";
                document.getElementById('img-counter').innerText = `${currentIndex + 1} / ${currentViewerGroup.length}`;
            } else { nav.className = "hidden"; }
        }

        function changeImage(n) { currentIndex = (currentIndex + n + currentViewerGroup.length) % currentViewerGroup.length; updateModal(); }
        function closeModal() { document.getElementById('imageModal').style.display='none'; document.body.style.overflow='auto'; }
        
        function filterArt(c) {
            document.querySelectorAll('.cat-btn').forEach(b => b.className = "cat-btn bg-white/5 px-8 py-2.5 rounded-2xl font-bold text-sm text-gray-400 hover:bg-white/10 transition");
            event.target.className = "cat-btn bg-red-custom px-8 py-2.5 rounded-2xl font-black text-sm text-white shadow-xl shadow-red-600/20";
            renderGallery(c);
        }

        async function deleteArt(id) { if(confirm("حذف نهائي؟")) { await db.collection('artworks').doc(id).delete(); location.reload(); } }

        function renderFlashSale() {
            const offers = [{ id: 'ha1', t: 'الأصالة الزيتية', o: '250$', f: '200$', s: '60x80', d: 'لوحة زيتية كلاسيكية.' }, { id: 'ha5', t: 'تحفة العصر الروماني (1984)', o: '250$', f: '200$', s: '70x120', d: 'لوحة رومانية تعود لعام 1984، قطعة فنية فريدة تعكس دقة الفن الكلاسيكي.' }];
            const elapsed = (Date.now() - new Date('2024-01-01').getTime()) % (13 * 24 * 60 * 60 * 1000);
            const idx = Math.floor(elapsed / (48 * 60 * 60 * 1000));
            if(idx < offers.length) {
                const off = offers[idx];
                const h = Math.floor(((48 * 60 * 60 * 1000) - (elapsed % (48 * 60 * 60 * 1000))) / 3600000);
                const m = Math.floor((((48 * 60 * 60 * 1000) - (elapsed % (48 * 60 * 60 * 1000))) % 3600000) / 60000);
                document.getElementById('flash-sale-container').innerHTML = `<div class="flash-box rounded-[2.5rem] p-6 mt-8 border-2 border-red-custom bg-red-600/5 cursor-pointer hover:scale-[1.02] transition-transform" onclick="openPreviewStatic('${off.t}', '${off.id}.jpg', '${off.s}', '${off.f}', '${off.d}')"><div class="flex flex-col md:flex-row gap-6 items-center text-right"><img src="${off.id}.jpg" class="w-24 h-24 object-cover rounded-xl border-2 border-red-custom shadow-xl"><div class="flex-1"><h2 class="text-lg font-bold text-white">${off.t}</h2><div class="text-2xl font-black text-white">${off.f} <span class="line-through text-xs text-gray-500">${off.o}</span></div><div class="text-[10px] text-red-custom font-mono mt-2 italic">ينتهي خلال: ${h}س ${m}د</div></div></div></div>`;
            }
        }
        function openPreviewStatic(t, img, s, p, d) {
            document.getElementById('modal-img').src = img;
            document.getElementById('modal-title').innerText = t;
            document.getElementById('modal-desc').innerText = d;
            document.getElementById('modal-size').innerText = "📏 القياس: " + s;
            document.getElementById('modal-price').innerText = "💰 السعر: " + p;
            document.getElementById('nav-controls').className = "hidden";
            document.getElementById('imageModal').style.display = 'flex';
        }

        async function handleOrderRequest(event) {
            event.preventDefault();
            alert("سيتم فتح واتساب لإكمال طلبك!");
            window.location.href = `https://wa.me/${MY_PHONE}?text=طلب رسم جديد من الموقع`;
        }

        loadData();
    </script>
</body>
</html>
