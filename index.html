<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>مرسم أمير عايد | إدارة الألبومات</title>
    
    <!-- Firebase SDKs -->
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-firestore-compat.js"></script>

    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700;900&display=swap" rel="stylesheet">
    
    <style>
        body { font-family: 'Tajawal', sans-serif; background-color: #050811; color: white; scroll-behavior: smooth; overflow-x: hidden; }
        .hero-section { background-image: linear-gradient(to bottom, rgba(5, 8, 17, 0.6), rgba(5, 8, 17, 0.98)), url('hero.jpg'); background-size: cover; background-position: center; min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; padding: 100px 20px; }
        .text-red-custom { color: #ef4444; }
        .bg-red-custom { background-color: #ef4444; }
        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.98); z-index: 2000; align-items: center; justify-content: center; padding: 10px; overflow-y: auto; }
        .modal-content { background: #0c0c0c; border: 1px solid #333; width: 100%; max-width: 950px; max-height: 95vh; border-radius: 28px; position: relative; overflow-y: auto; overflow-x: hidden; animation: zoomIn 0.3s ease; }
        .close-btn { position: absolute; top: 15px; left: 15px; background: #ef4444; color: white; width: 45px; height: 45px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: bold; z-index: 2100; cursor: pointer; border: 2px solid white; box-shadow: 0 0 20px rgba(239, 68, 68, 0.6); }
        #adminPanel, .admin-only { display: none; }
        .glass-input { background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); border-radius: 12px; padding: 12px; width: 100%; outline: none; color: white; margin-bottom: 10px; text-align: right; }
        .name-glow { text-shadow: 0 0 40px rgba(239, 68, 68, 0.7); font-size: clamp(3.5rem, 12vw, 8.5rem); }
        .nav-bar { display: flex; align-items: center; justify-content: center; gap: 30px; padding: 15px; background: rgba(255,255,255,0.03); }
        .nav-btn { background: #ef4444; color: white; width: 40px; height: 40px; border-radius: 10px; display: flex; align-items: center; justify-content: center; cursor: pointer; }
    </style>
</head>
<body>

    <!-- Navbar -->
    <nav class="fixed w-full top-0 z-[150] bg-black/90 backdrop-blur-xl p-4 border-b border-white/5 flex justify-between items-center px-4">
        <div class="text-2xl font-black text-red-custom">أمير عايد</div>
        <button onclick="openOrderModal()" class="bg-red-custom text-white px-5 py-2 rounded-xl font-bold text-xs shadow-lg">طلب رسم ✨</button>
    </nav>

    <!-- Hero -->
    <header class="hero-section">
        <div data-aos="fade-up">
            <h1 class="font-black text-white name-glow leading-tight">أمير <span class="text-red-custom">عايد</span></h1>
            <p class="text-lg md:text-2xl font-bold mb-10 italic bg-black/40 px-8 py-2 rounded-full inline-block mt-4 border border-white/5 text-shadow text-white">فنٌ يملأ الفراغ.. ودقة تحاكي الواقع ✨</p>
            
            <div id="adminPanel" class="mb-10 bg-green-600/10 border border-green-600 p-6 rounded-[2.5rem] shadow-2xl mx-auto max-w-lg">
                <button onclick="document.getElementById('uploadModal').style.display='flex'" class="bg-green-600 text-white px-10 py-3 rounded-2xl font-black shadow-lg">➕ رفع صور أو ألبومات</button>
                <button onclick="logout()" class="mr-4 text-xs text-red-500 underline">خروج</button>
            </div>
            <div id="flashSaleArea" class="max-w-xl mx-auto space-y-4"></div>
        </div>
    </header>

    <!-- المعرض -->
    <section class="max-w-7xl mx-auto px-6 py-20 text-right">
        <div id="filterButtons" class="flex flex-wrap justify-center gap-3 mb-16">
            <button onclick="renderGallery('all')" class="cat-btn bg-red-custom px-8 py-2.5 rounded-2xl font-black text-sm text-white">الكل</button>
        </div>
        <div id="dynamicGallery" class="grid grid-cols-2 md:grid-cols-4 lg:grid-cols-5 gap-6 text-center">
            <div id="loadingStatus" class="col-span-full py-20 text-gray-600 font-bold animate-pulse">جاري جلب لوحاتك من السحابة...</div>
        </div>
    </section>

    <!-- Footer السري -->
    <footer class="py-20 border-t border-white/5 text-center cursor-pointer" onclick="document.getElementById('loginModal').style.display='flex'">
        <span class="text-gray-900 font-bold italic">P طاهر</span>
    </footer>

    <!-- Modal الرفع -->
    <div id="uploadModal" class="modal">
        <div class="modal-content max-w-lg p-10 border-green-600 border-2">
            <div class="close-btn" onclick="this.parentElement.parentElement.style.display='none'">✕</div>
            <h2 class="text-2xl font-black text-green-500 mb-8 text-center underline">نشر عمل فني / ألبوم</h2>
            <div id="upStatus" class="hidden bg-blue-600 text-white p-3 text-[10px] text-center mb-6 rounded-xl font-bold italic"></div>
            
            <input type="text" id="artTitle" placeholder="عنوان اللوحة" class="glass-input">
            <input type="text" id="artCategory" placeholder="القسم (زيتي، رصاص، روضات..)" class="glass-input">
            <input type="text" id="artGroupName" placeholder="اسم المجموعة (اختياري لربط الصور)" class="glass-input">
            <input type="text" id="artPrice" placeholder="السعر" class="glass-input">
            <input type="text" id="artSize" placeholder="القياس" class="glass-input">
            <textarea id="artDesc" placeholder="التفاصيل" class="glass-input h-20"></textarea>
            <input type="file" id="artFiles" multiple class="block w-full text-xs text-gray-400 mb-6">
            
            <button onclick="uploadImages()" id="upBtn" class="w-full bg-green-600 p-4 rounded-xl font-black text-lg">بدء الرفع</button>
        </div>
    </div>

    <!-- Modal عرض الصور المطور (مع خيارات الإدارة) -->
    <div id="imageModal" class="modal">
        <div class="modal-content shadow-2xl">
            <div class="close-btn" onclick="closeModal()">✕</div>
            <div class="flex flex-col md:flex-row">
                <div class="relative w-full md:w-3/5 bg-black h-[400px] md:h-[650px] flex items-center justify-center">
                    <img id="modal-img" src="" class="max-w-full max-h-full object-contain">
                    <div id="nav-controls" class="absolute bottom-0 left-0 w-full nav-bar hidden">
                        <div class="nav-btn" onclick="changeImage(1)">←</div>
                        <span id="img-counter" class="text-white font-bold text-xs"></span>
                        <div class="nav-btn" onclick="changeImage(-1)">→</div>
                    </div>
                </div>
                <div class="w-full md:w-2/5 p-10 text-right overflow-y-auto">
                    <h2 id="modal-title" class="text-3xl font-black text-red-custom mb-6"></h2>
                    <p id="modal-desc" class="text-gray-300 text-sm leading-relaxed mb-6 italic"></p>
                    <div id="info-box" class="bg-white/5 p-6 rounded-3xl space-y-4 font-bold">
                        <p id="modal-size"></p><p id="modal-price" class="text-3xl text-red-custom"></p>
                    </div>

                    <!-- أزرار إدارة الألبوم (تظهر للمدير فقط) -->
                    <div class="admin-only mt-6 p-4 border border-dashed border-green-600 rounded-2xl bg-green-600/5">
                        <p class="text-green-500 text-[10px] mb-3 font-bold">أدوات الإدارة لهذا الألبوم:</p>
                        <button id="addToAlbumBtn" class="w-full bg-green-600 text-white p-3 rounded-xl font-black text-xs mb-2 hover:bg-green-700 transition">➕ إضافة صور لهذا الألبوم</button>
                    </div>

                    <a id="wa-btn" href="#" class="block w-full mt-8 bg-red-custom text-white text-center p-5 rounded-2xl font-black text-lg">تواصل واتساب</a>
                </div>
            </div>
        </div>
    </div>

    <!-- تسجيل دخول -->
    <div id="loginModal" class="modal"><div class="modal-content max-w-sm p-10 text-center border-red-custom/50 border-2"><div class="close-btn" onclick="this.parentElement.parentElement.style.display='none'">✕</div><h2 class="text-xl font-black text-red-custom mb-6 italic">تحقق الإدارة</h2><input type="email" id="email" placeholder="البريد" class="glass-input"><input type="password" id="password" placeholder="السر" class="glass-input"><button onclick="login()" class="w-full bg-red-custom p-4 rounded-xl font-black mt-4 text-white shadow-lg">دخول</button></div></div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyD0g9fQAHVKLfdwUTFzsRvgd_ejXKgDMZM",
            authDomain: "ameer-5ad16.firebaseapp.com",
            projectId: "ameer-5ad16",
            storageBucket: "ameer-5ad16.firebasestorage.app",
            messagingSenderId: "819681497602",
            appId: "1:819681497602:web:ea755095b3a0c178dd8d1b",
            measurementId: "G-W3CWEX8SLH"
        };
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.firestore();

        const MY_PHONE = "9647829558820";
        const ADMIN_EMAIL = "taheralrsam100@gmail.com";
        const IMGBB_KEY = "2992948833d81d6dc8555d60cdd13431";

        let artworks = []; let currentGroup = []; let currentIndex = 0;

        function startListening() {
            db.collection('artworks').orderBy('createdAt', 'desc').onSnapshot(snap => {
                artworks = snap.docs.map(doc => ({id: doc.id, ...doc.data()}));
                document.getElementById('loadingStatus').style.display = 'none';
                updateFilters();
                renderGallery('all');
            });
        }

        auth.onAuthStateChanged(user => {
            if (user && user.email.toLowerCase() === ADMIN_EMAIL.toLowerCase()) {
                document.getElementById('adminPanel').style.display = 'block';
                document.getElementById('logoutBtn').style.display = 'block';
                document.querySelectorAll('.admin-only').forEach(e => e.style.display = 'block');
            }
        });

        async function login() {
            try { await auth.signInWithEmailAndPassword(document.getElementById('email').value, document.getElementById('password').value); location.reload(); } catch(e) { alert("بيانات خاطئة!"); }
        }
        function logout() { auth.signOut(); location.reload(); }

        async function uploadImages() {
            const files = document.getElementById('artFiles').files;
            const title = document.getElementById('artTitle').value;
            const cat = document.getElementById('artCategory').value;
            const grp = document.getElementById('artGroupName').value || "";

            if (files.length === 0 || !title || !cat) return alert("أكمل البيانات");
            const upBtn = document.getElementById('upBtn');
            const status = document.getElementById('upStatus');
            upBtn.disabled = true; status.classList.remove('hidden');

            try {
                for (let i = 0; i < files.length; i++) {
                    status.innerText = `جاري الرفع (${i+1}/${files.length})...`;
                    const fd = new FormData(); fd.append("image", files[i]);
                    const r = await fetch(`https://api.imgbb.com/1/upload?key=${IMGBB_KEY}`, { method: "POST", body: fd });
                    const d = await r.json();
                    if (d.success) {
                        await db.collection('artworks').add({
                            title: files.length > 1 ? `${title} (${i+1})` : title,
                            category: cat, group: grp || (cat === 'رصاص' ? 'ألبوم الرصاص' : ""),
                            price: document.getElementById('artPrice').value || "اتصل",
                            size: document.getElementById('artSize').value || "",
                            desc: document.getElementById('artDesc').value || "",
                            url: d.data.url, createdAt: firebase.firestore.FieldValue.serverTimestamp()
                        });
                    }
                }
                alert("✅ تم النشر!"); location.reload();
            } catch (err) { alert("خطأ!"); upBtn.disabled = false; }
        }

        function renderGallery(cat) {
            const grid = document.getElementById('dynamicGallery'); grid.innerHTML = "";
            const isAdmin = auth.currentUser && auth.currentUser.email === ADMIN_EMAIL;
            let list = cat === 'all' ? artworks : artworks.filter(a => a.category === cat);
            const processedGroups = new Set();

            list.forEach(art => {
                if(art.group && art.group !== "") {
                    if(!processedGroups.has(art.group)) {
                        const grpItems = artworks.filter(a => a.group === art.group);
                        grid.innerHTML += `
                            <div class="glass-card rounded-[2.2rem] overflow-hidden border-2 border-red-custom/20 relative" onclick="openWork('${art.id}')">
                                <span class="absolute top-2 right-2 bg-red-custom text-[8px] px-2 py-0.5 rounded-md font-bold">ألبوم: ${grpItems.length}</span>
                                <img src="${art.url}" class="w-full h-48 object-cover">
                                <div class="p-3 text-center text-[10px] font-bold text-red-custom">${art.group}
                                    <button onclick="deleteFullGroup(event, '${art.group}')" class="block text-[8px] text-gray-500 underline mt-1" style="display:${isAdmin?'block':'none'}">حذف الألبوم بالكامل</button>
                                </div>
                            </div>`;
                        processedGroups.add(art.group);
                    }
                } else {
                    grid.innerHTML += `
                        <div class="glass-card rounded-[2.2rem] overflow-hidden relative" onclick="openWork('${art.id}')">
                            <img src="${art.url}" class="w-full h-48 object-cover cursor-pointer">
                            <div class="p-3 text-center text-[10px] font-bold text-gray-400">${art.title} 
                                <button onclick="deleteArt(event, '${art.id}')" class="block text-red-500 underline mx-auto mt-1" style="display:${isAdmin?'block':'none'}">حذف</button>
                            </div>
                        </div>`;
                }
            });
        }

        function openWork(id) {
            const art = artworks.find(a => a.id === id);
            currentGroup = (art.group && art.group !== "") ? artworks.filter(a => a.group === art.group) : [art];
            currentIndex = currentGroup.findIndex(a => a.id === id);
            
            // تحديث واجهة الإضافة للألبوم للمدير
            const addBtn = document.getElementById('addToAlbumBtn');
            if(art.group) {
                addBtn.onclick = () => {
                    document.getElementById('artGroupName').value = art.group;
                    document.getElementById('artCategory').value = art.category;
                    document.getElementById('uploadModal').style.display = 'flex';
                };
            } else { addBtn.parentElement.style.display = 'none'; }

            updateModal();
            document.getElementById('imageModal').style.display = 'flex';
        }

        function updateModal() {
            const art = currentGroup[currentIndex];
            document.getElementById('modal-img').src = art.url;
            document.getElementById('modal-title').innerText = art.title;
            document.getElementById('modal-desc').innerText = art.desc || "عمل فني بريشة أمير عايد.";
            document.getElementById('modal-size').innerText = art.size ? "📏 القياس: " + art.size : "";
            document.getElementById('modal-price').innerText = art.price ? "💰 السعر: " + art.price : "";
            const nav = document.getElementById('nav-controls');
            if(currentGroup.length > 1) {
                nav.className = "absolute bottom-0 left-0 w-full nav-bar flex";
                document.getElementById('img-counter').innerText = `${currentIndex + 1} / ${currentGroup.length}`;
            } else { nav.className = "hidden"; }
            document.getElementById('wa-btn').href = `https://wa.me/${MY_PHONE}?text=${encodeURIComponent('أود طلب: ' + art.title)}`;
        }

        function changeImage(n) { currentIndex = (currentIndex + n + currentGroup.length) % currentGroup.length; updateModal(); }
        function closeModal() { document.getElementById('imageModal').style.display='none'; }
        
        async function deleteArt(e, id) { e.stopPropagation(); if(confirm("حذف هذه اللوحة؟")) { await db.collection('artworks').doc(id).delete(); } }
        
        async function deleteFullGroup(e, groupName) { 
            e.stopPropagation();
            if(confirm(`⚠️ تحذير: سيتم حذف ألبوم "${groupName}" بالكامل (كل الصور بداخله). هل أنت متأكد؟`)) {
                const snap = await db.collection('artworks').where('group', '==', groupName).get();
                const batch = db.batch();
                snap.forEach(doc => batch.delete(doc.ref));
                await batch.commit();
                alert("تم حذف الألبوم بنجاح");
            }
        }

        function updateFilters() {
            const filterDiv = document.getElementById('filterButtons');
            const cats = [...new Set(artworks.map(a => a.category))];
            filterDiv.innerHTML = `<button onclick="renderGallery('all')" class="cat-btn bg-red-custom px-8 py-2.5 rounded-2xl font-black text-sm text-white shadow-xl">الكل</button>`;
            cats.forEach(c => { if(c) filterDiv.innerHTML += `<button onclick="renderGallery('${c}')" class="cat-btn bg-white/5 px-8 py-2.5 rounded-2xl font-bold text-sm text-gray-400 mx-1">${c}</button>`; });
        }

        function openOrderModal() { window.location.href=`https://wa.me/${MY_PHONE}?text=طلب رسم خاص.`; }
        startListening();
    </script>
</body>
</html>
