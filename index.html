<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>مرسم أمير عايد | المعرض الاحترافي</title>
    
    <!-- Firebase SDKs -->
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-firestore-compat.js"></script>

    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700;900&display=swap" rel="stylesheet">
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">

    <style>
        body { font-family: 'Tajawal', sans-serif; background-color: #050811; color: white; scroll-behavior: smooth; overflow-x: hidden; }
        .hero-section { background-image: linear-gradient(to bottom, rgba(5, 8, 17, 0.6), rgba(5, 8, 17, 0.98)), url('hero.jpg'); background-size: cover; background-position: center; min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; padding: 100px 20px; }
        .text-red-custom { color: #ef4444; }
        .bg-red-custom { background-color: #ef4444; }
        
        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.98); z-index: 2000; align-items: center; justify-content: center; padding: 10px; overflow-y: auto; }
        .modal-content { background: #0c0c0c; border: 1px solid #333; width: 100%; max-width: 950px; max-height: 95vh; border-radius: 28px; position: relative; overflow-y: auto; overflow-x: hidden; animation: zoomIn 0.3s ease; }
        
        .close-btn { position: absolute; top: 15px; left: 15px; background: #ef4444; color: white; width: 45px; height: 45px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: bold; z-index: 2100; cursor: pointer; border: 2px solid white; box-shadow: 0 0 20px rgba(239, 68, 68, 0.6); }
        
        /* إخفاء عناصر المدير افتراضياً بطريقة قوية */
        .admin-only { display: none !important; }
        .show-admin { display: block !important; }
        .show-admin-flex { display: flex !important; }

        .glass-input { background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); border-radius: 12px; padding: 12px; width: 100%; outline: none; color: white; margin-bottom: 10px; text-align: right; }
        .name-glow { text-shadow: 0 0 40px rgba(239, 68, 68, 0.6); font-size: clamp(3.5rem, 12vw, 8.5rem); }
        .nav-bar { display: flex; align-items: center; justify-content: center; gap: 30px; padding: 15px; background: rgba(255,255,255,0.03); }
        .nav-btn { background: #ef4444; color: white; width: 40px; height: 40px; border-radius: 10px; display: flex; align-items: center; justify-content: center; cursor: pointer; }
    </style>
</head>
<body>

    <!-- Navbar -->
    <nav class="fixed w-full top-0 z-[150] bg-black/90 backdrop-blur-xl p-4 border-b border-white/5 flex justify-between items-center px-4">
        <div class="text-2xl font-black text-red-custom tracking-tighter">أمير عايد</div>
        <div class="flex gap-4 items-center">
            <button onclick="logout()" id="logoutBtn" class="admin-only text-[10px] text-red-500 font-black border border-red-500/30 px-3 py-1 rounded-lg">تسجيل خروج</button>
            <button onclick="openOrderModal()" class="bg-red-custom text-white px-4 py-1.5 rounded-xl font-bold text-[10px] shadow-lg">طلب رسم خاص ✨</button>
        </div>
    </nav>

    <!-- Hero -->
    <header class="hero-section">
        <div data-aos="fade-up">
            <h1 class="font-black text-white name-glow leading-tight">أمير <span class="text-red-custom">عايد</span></h1>
            <p class="text-lg md:text-2xl font-bold mb-10 italic bg-black/40 px-8 py-2 rounded-full inline-block mt-4">فنٌ يملأ الفراغ.. ودقة تحاكي الواقع ✨</p>
            
            <!-- أزرار المدير (ستظهر عند تسجيل الدخول) -->
            <div id="adminPanel" class="admin-only mb-10 bg-green-600/10 border border-green-600/30 p-6 rounded-[2.5rem]">
                <p class="text-green-500 text-xs mb-3 font-bold">أهلاً بك يا مبدع، لوحة التحكم مفعلة الآن:</p>
                <button onclick="document.getElementById('uploadModal').style.display='flex'" class="bg-green-600 text-white px-10 py-3 rounded-2xl font-black shadow-xl hover:bg-green-700 transition">➕ رفع صور جديدة للمعرض</button>
            </div>

            <div id="flash-sale-area" class="hidden flash-box rounded-[2.5rem] p-6 max-w-xl mx-auto text-right border-2 border-red-custom bg-red-600/5 cursor-pointer" onclick="openFlashDetail()">
                <!-- عرض الفلاش سال -->
            </div>
        </div>
    </header>

    <!-- المعرض -->
    <section class="max-w-7xl mx-auto px-6 py-20 text-right">
        <div id="filterButtons" class="flex flex-wrap justify-center gap-3 mb-16">
            <button onclick="filterArt('all')" class="cat-btn bg-red-custom px-8 py-2.5 rounded-2xl font-black text-sm text-white shadow-xl">الكل</button>
        </div>
        <div id="dynamicGallery" class="grid grid-cols-2 md:grid-cols-4 lg:grid-cols-5 gap-6 text-center"></div>
    </section>

    <!-- المدخل السري في الأسفل -->
    <footer class="py-20 border-t border-white/5 text-center">
        <div id="loginEntry" class="flex items-center justify-center gap-2 text-gray-800 hover:text-red-900 transition cursor-pointer" onclick="document.getElementById('loginModal').style.display='flex'">
            <span class="w-8 h-8 border border-current rounded-full flex items-center justify-center font-bold italic">P</span>
            <span class="text-sm font-bold">طاهر</span>
        </div>
    </footer>

    <!-- Modal تسجيل الدخول المطور -->
    <div id="loginModal" class="modal">
        <div class="modal-content max-w-sm p-10 text-center border-red-custom/50 border-2">
            <div class="close-btn" onclick="this.parentElement.parentElement.style.display='none'">✕</div>
            <h2 class="text-2xl font-black text-red-custom mb-8 italic">تـحـقـق الإدارة</h2>
            <div id="loginStatus" class="hidden text-xs text-red-500 mb-4 font-bold italic">جاري التحقق...</div>
            <input type="email" id="email" placeholder="البريد الإلكتروني" class="glass-input">
            <input type="password" id="password" placeholder="كلمة السر" class="glass-input">
            <button onclick="login()" id="loginActionBtn" class="w-full bg-red-custom p-4 rounded-xl font-black mt-4 text-white shadow-lg">تأكيد الدخول</button>
        </div>
    </div>

    <!-- [نفس مودالات الرفع وعرض الصور السابقة مع إضافة كلاس admin-only] -->
    <div id="uploadModal" class="modal">
        <div class="modal-content max-w-lg p-10 border-green-600 border-2">
            <div class="close-btn" onclick="this.parentElement.parentElement.style.display='none'">✕</div>
            <h2 class="text-2xl font-black text-green-500 mb-8 text-center underline">نشر أعمال فنية جديدة</h2>
            <div id="batchStatus" class="hidden bg-blue-600 text-white p-3 text-[10px] text-center mb-6 rounded-xl font-bold animate-pulse"></div>
            <input type="text" id="artTitle" placeholder="اسم اللوحة" class="glass-input">
            <input type="text" id="artCategory" list="categoriesList" placeholder="القسم (مثلاً: جداريات)" class="glass-input">
            <datalist id="categoriesList"><option value="زيتي"><option value="جداريات"><option value="رصاص"><option value="روضات"></datalist>
            <input type="text" id="artPrice" placeholder="السعر" class="glass-input">
            <input type="text" id="artSize" placeholder="القياس" class="glass-input">
            <textarea id="artDesc" placeholder="التفاصيل" class="glass-input h-24"></textarea>
            <input type="file" id="artFiles" multiple class="block w-full text-xs text-gray-400 mb-6">
            <button onclick="uploadBatchArtworks()" id="upBtn" class="w-full bg-green-600 p-4 rounded-xl font-black text-lg">بدء الرفع</button>
        </div>
    </div>

    <div id="imageModal" class="modal">
        <div class="modal-content shadow-2xl">
            <div class="close-btn" onclick="closeModal()">✕</div>
            <div class="flex flex-col md:flex-row">
                <div class="relative w-full md:w-3/5 bg-black h-[400px] md:h-[650px] flex items-center justify-center border-l border-white/5">
                    <img id="modal-img" src="" class="max-w-full max-h-full object-contain">
                    <div id="nav-controls" class="absolute bottom-0 left-0 w-full nav-bar hidden">
                        <div class="nav-btn" onclick="changeImage(1)">←</div>
                        <span id="img-counter" class="text-white font-bold text-xs"></span>
                        <div class="nav-btn" onclick="changeImage(-1)">→</div>
                    </div>
                </div>
                <div class="w-full md:w-2/5 p-10 text-right overflow-y-auto max-h-[400px] md:max-h-[650px]">
                    <h2 id="modal-title" class="text-3xl font-black text-red-custom mb-6"></h2>
                    <p id="modal-desc" class="text-gray-300 text-sm leading-relaxed mb-8 pr-4 border-r-2 border-red-custom italic font-bold"></p>
                    <div id="info-box" class="bg-white/5 p-6 rounded-3xl space-y-4 font-black"><p id="modal-size" class="text-white text-lg"></p><p id="modal-price" class="text-3xl text-red-custom"></p></div>
                    <a id="wa-link" href="#" class="block w-full mt-10 bg-red-custom text-white text-center p-4 rounded-xl font-black">تواصل واتساب</a>
                </div>
            </div>
        </div>
    </div>

    <script>
        // --- Firebase Config (بياناتك الصحيحة) ---
        const firebaseConfig = {
            apiKey: "AIzaSyD0g9fQAHVKLfdwUTFzsRvgd_ejXKgDMZM",
            authDomain: "artt2001-47518.firebaseapp.com",
            projectId: "artt2001-47518",
            storageBucket: "artt2001-47518.firebasestorage.app",
            messagingSenderId: "254647132198",
            appId: "1:254647132198:web:42e0e71b3b9443ab9dc6e7"
        };
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.firestore();

        const MY_PHONE = "9647829558820";
        const ADMIN_EMAIL = "taheralrsam100@gmail.com";
        const IMGBB_KEY = "2992948833d81d6dc8555d60cdd13431";

        // وظيفة إظهار عناصر التحكم للمدير فوراً
        function showAdminControls() {
            document.querySelectorAll('.admin-only').forEach(el => {
                el.classList.add('show-admin');
            });
            document.getElementById('adminPanel').classList.add('show-admin');
            document.getElementById('loginEntry').style.display = 'none'; // إخفاء زر "طاهر" بعد الدخول
        }

        // مراقبة حالة الدخول
        auth.onAuthStateChanged(user => {
            if (user && user.email.toLowerCase() === ADMIN_EMAIL.toLowerCase()) {
                showAdminControls();
                renderGallery('all'); // إعادة رسم المعرض لتظهر أزرار الحذف
            }
        });

        // تسجيل الدخول المصلح
        async function login() {
            const e = document.getElementById('email').value;
            const p = document.getElementById('password').value;
            const status = document.getElementById('loginStatus');
            const btn = document.getElementById('loginActionBtn');

            if(!e || !p) return alert("املاً الحقول");

            status.classList.remove('hidden');
            btn.disabled = true;

            try {
                await auth.signInWithEmailAndPassword(e, p);
                document.getElementById('loginModal').style.display = 'none';
                alert("تم التحقق بنجاح يا أمير، لوحة التحكم مفعلة الآن.");
            } catch(err) {
                alert("بيانات الدخول غير صحيحة!");
                status.classList.add('hidden');
                btn.disabled = false;
            }
        }

        function logout() { auth.signOut(); location.reload(); }

        // باقي الوظائف (تحميل البيانات، الرفع المتعدد، الفلتر)
        let artworks = []; let currentGroup = []; let currentIndex = 0;

        async function loadData() {
            const snap = await db.collection('artworks').orderBy('createdAt', 'desc').get();
            artworks = snap.docs.map(doc => ({id: doc.id, ...doc.data()}));
            
            const filterDiv = document.getElementById('filterButtons');
            const cats = [...new Set(artworks.map(a => a.category))];
            cats.forEach(c => {
                if(c) filterDiv.innerHTML += `<button onclick="filterArt('${c}')" class="cat-btn bg-white/5 px-8 py-2.5 rounded-2xl font-bold text-sm text-gray-400 hover:bg-white/10 transition">${c}</button>`;
            });
            renderGallery('all');
        }

        function renderGallery(cat) {
            const grid = document.getElementById('dynamicGallery');
            grid.innerHTML = "";
            const filtered = cat === 'all' ? artworks : artworks.filter(a => a.category === cat);
            
            filtered.forEach(art => {
                const isAdmin = (auth.currentUser && auth.currentUser.email === ADMIN_EMAIL);
                grid.innerHTML += `
                    <div class="glass-card rounded-[2.2rem] overflow-hidden group">
                        <img src="${art.url}" onclick="openWork('${art.id}')" class="w-full h-48 md:h-56 object-cover cursor-pointer">
                        <div class="p-3 text-center">
                            <p class="text-[10px] font-bold text-gray-400">${art.title}</p>
                            <button onclick="deleteArt('${art.id}')" class="${isAdmin ? 'show-admin' : 'admin-only'} text-red-500 text-[9px] mt-2 underline font-black">حذف نهائي</button>
                        </div>
                    </div>`;
            });
        }

        // دالة الرفع المتعدد
        async function uploadBatchArtworks() {
            const files = document.getElementById('artFiles').files;
            const title = document.getElementById('artTitle').value;
            const cat = document.getElementById('artCategory').value;
            const price = document.getElementById('artPrice').value;
            const size = document.getElementById('artSize').value;
            const desc = document.getElementById('artDesc').value;

            if (files.length === 0 || !title || !cat) return alert("يرجى إكمال البيانات الأساسية");

            const upBtn = document.getElementById('upBtn');
            const statusDiv = document.getElementById('batchStatus');
            upBtn.disabled = true; statusDiv.classList.remove('hidden');

            for (let i = 0; i < files.length; i++) {
                statusDiv.innerText = `جاري الرفع (${i + 1} من ${files.length})...`;
                try {
                    const fd = new FormData(); fd.append("image", files[i]);
                    const r = await fetch(`https://api.imgbb.com/1/upload?key=${IMGBB_KEY}`, { method: "POST", body: fd });
                    const d = await r.json();
                    if (d.success) {
                        await db.collection('artworks').add({
                            title: files.length > 1 ? `${title} (${i+1})` : title,
                            category: cat, group: title, price, size, desc,
                            url: d.data.url, createdAt: firebase.firestore.FieldValue.serverTimestamp()
                        });
                    }
                } catch (e) {}
            }
            location.reload();
        }

        async function deleteArt(id) { if(confirm("حذف؟")) { await db.collection('artworks').doc(id).delete(); location.reload(); } }
        function openWork(id) {
            const art = artworks.find(a => a.id === id);
            currentGroup = artworks.filter(a => a.group === art.group && art.group !== "");
            if(currentGroup.length <= 1) currentGroup = [art];
            currentIndex = currentGroup.findIndex(a => a.id === id);
            document.getElementById('nav-controls').className = currentGroup.length > 1 ? "absolute bottom-0 left-0 w-full nav-bar flex" : "hidden";
            updateModal();
            document.getElementById('imageModal').style.display = 'flex';
        }
        function updateModal() {
            const art = currentGroup[currentIndex];
            document.getElementById('modal-img').src = art.url;
            document.getElementById('modal-title').innerText = art.title;
            document.getElementById('modal-desc').innerText = art.desc || "عمل فني من مرسم أمير عايد.";
            document.getElementById('modal-size').innerText = art.size ? "📏 القياس: " + art.size : "";
            document.getElementById('modal-price').innerText = art.price ? "💰 السعر: " + art.price : "";
            document.getElementById('img-counter').innerText = `${currentIndex + 1} / ${currentGroup.length}`;
            document.getElementById('wa-link').href = `https://wa.me/${MY_PHONE}?text=${encodeURIComponent('أود الاستفسار عن: ' + art.title)}`;
        }
        function changeImage(n) { currentIndex = (currentIndex + n + currentGroup.length) % currentGroup.length; updateModal(); }
        function closeModal() { document.getElementById('imageModal').style.display='none'; document.body.style.overflow='auto'; }
        function filterArt(c) { renderGallery(c); }

        loadData();
    </script>
</body>
</html>
