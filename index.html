<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>مرسم أمير عايد | لوحة التحكم والمعرض</title>
    
    <!-- Firebase SDKs -->
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-storage-compat.js"></script>

    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700;900&display=swap" rel="stylesheet">
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">

    <style>
        body { font-family: 'Tajawal', sans-serif; background-color: #050811; color: white; scroll-behavior: smooth; overflow-x: hidden; }
        .hero-section { background-image: linear-gradient(to bottom, rgba(5, 8, 17, 0.5), rgba(5, 8, 17, 0.95)), url('hero.jpg'); background-size: cover; background-position: center; min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; padding-top: 80px; }
        .text-red-custom { color: #ef4444; }
        .bg-red-custom { background-color: #ef4444; }
        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.98); z-index: 2000; align-items: center; justify-content: center; padding: 10px; overflow-y: auto; }
        .modal-content { background: #0c0c0c; border: 1px solid #333; width: 100%; max-width: 950px; max-height: 95vh; border-radius: 24px; position: relative; overflow-y: auto; overflow-x: hidden; animation: zoomIn 0.3s ease; }
        .close-btn { position: absolute; top: 15px; left: 15px; background: #ef4444; color: white; width: 42px; height: 42px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: bold; z-index: 2100; cursor: pointer; border: 2px solid white; box-shadow: 0 0 20px rgba(239, 68, 68, 0.6); }
        .flash-box { background: rgba(239, 68, 68, 0.08); border: 2px solid #ef4444; cursor: pointer; }
        .glass-card { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.1); transition: 0.4s; cursor: pointer; }
        .admin-only { display: none; }
        .glass-input { background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); border-radius: 12px; padding: 12px; width: 100%; outline: none; color: white; margin-bottom: 10px; text-align: right; }
        @keyframes zoomIn { from { transform: scale(0.98); opacity: 0; } to { transform: scale(1); opacity: 1; } }
        .name-glow { text-shadow: 0 0 30px rgba(239, 68, 68, 0.6); font-size: clamp(3rem, 10vw, 8rem); }
    </style>
</head>
<body>

    <!-- القائمة العلوية -->
    <nav class="fixed w-full top-0 z-[150] bg-black/90 backdrop-blur-xl p-4 border-b border-white/5">
        <div class="max-w-7xl mx-auto flex justify-between items-center px-4">
            <div class="text-2xl font-black text-red-custom tracking-tighter">أمير عايد</div>
            <div class="flex gap-4">
                <button onclick="document.getElementById('loginModal').style.display='flex'" id="loginBtn" class="text-[10px] text-gray-500 underline">لوحة التحكم</button>
                <button onclick="logout()" id="logoutBtn" class="admin-only text-[10px] text-red-500 font-bold">خروج</button>
                <button onclick="openOrderModal()" class="bg-red-custom text-white px-4 py-1.5 rounded-xl font-bold text-[10px] md:text-xs shadow-lg">طلب رسم</button>
            </div>
        </div>
    </nav>

    <!-- واجهة الترحيب -->
    <header class="hero-section">
        <div data-aos="fade-up">
            <h1 class="font-black text-white name-glow leading-tight">أمير <span class="text-red-custom">عايد</span></h1>
            <p class="text-lg md:text-2xl font-bold mb-10 italic bg-black/40 px-8 py-2 rounded-full inline-block mt-4">فنٌ يملأ الفراغ.. ودقة تحاكي الواقع ✨</p>
            <br>
            
            <div class="admin-only mb-10">
                <button onclick="document.getElementById('uploadModal').style.display='flex'" class="bg-green-600 px-8 py-4 rounded-2xl font-black shadow-2xl animate-pulse">➕ إضافة لوحة جديدة للمعرض</button>
            </div>

            <!-- عرض الخصم الموقوت (Flash Sale) -->
            <div id="flash-sale-area" class="flash-box rounded-[2.5rem] p-6 max-w-xl mx-auto text-right" onclick="openFlashDetail()">
                <div class="flex flex-col md:flex-row gap-6 items-center">
                    <img id="offer-img" src="ha5.jpg" class="w-32 h-32 object-cover rounded-2xl border-2 border-red-custom shadow-xl">
                    <div class="flex-1">
                        <h3 class="text-red-custom font-black text-xs mb-1 uppercase tracking-widest">🔥 عرض فلاش محدود</h3>
                        <h2 class="text-xl font-bold text-white mb-2">تحفة العصر الروماني (1984)</h2>
                        <div class="flex items-center gap-4">
                            <span class="text-3xl font-black text-white">200$</span>
                            <span class="line-through text-gray-500 text-sm">250$</span>
                        </div>
                        <p class="text-[10px] text-gray-400 mt-2">قياس 70×120 - اضغط للمعاينة</p>
                    </div>
                </div>
            </div>
        </div>
    </header>

    <!-- المعرض الذكي -->
    <section class="max-w-7xl mx-auto px-6 py-24 text-right">
        <div class="flex flex-wrap justify-center gap-3 mb-20">
            <button onclick="filterArt('all')" class="cat-btn bg-red-custom px-8 py-2 rounded-xl font-black text-sm">الكل</button>
            <button onclick="filterArt('oil')" class="cat-btn bg-white/5 px-8 py-2 rounded-xl font-bold text-sm text-gray-400">زيتي</button>
            <button onclick="filterArt('mural')" class="cat-btn bg-white/5 px-8 py-2 rounded-xl font-bold text-sm text-gray-400">جداريات</button>
            <button onclick="filterArt('lead')" class="cat-btn bg-white/5 px-8 py-2 rounded-xl font-bold text-sm text-gray-400">رصاص</button>
            <button onclick="filterArt('kids')" class="cat-btn bg-white/5 px-8 py-2 rounded-xl font-bold text-sm text-gray-400">روضات</button>
        </div>

        <div id="dynamicGallery" class="grid grid-cols-2 md:grid-cols-4 lg:grid-cols-5 gap-6">
            <!-- اللوحات تظهر هنا تلقائياً -->
            <div class="col-span-full text-center py-20 text-gray-600 animate-pulse">جاري تحميل المعرض الفني...</div>
        </div>
    </section>

    <!-- نافذة عرض اللوحة -->
    <div id="imageModal" class="modal">
        <div class="modal-content shadow-2xl">
            <div class="close-btn" onclick="closeModal()">✕</div>
            <div class="flex flex-col md:flex-row">
                <div class="relative w-full md:w-3/5 bg-black h-[400px] md:h-[600px] flex items-center justify-center">
                    <img id="modal-img" src="" class="max-w-full max-h-full object-contain">
                </div>
                <div class="w-full md:w-2/5 p-8 text-right overflow-y-auto">
                    <h2 id="modal-title" class="text-3xl font-black text-red-custom mb-6"></h2>
                    <p id="modal-desc" class="text-gray-300 text-sm leading-relaxed mb-6"></p>
                    <div class="bg-white/5 p-6 rounded-2xl border-r-4 border-red-custom space-y-2">
                        <p id="modal-size" class="text-white font-bold"></p>
                        <p id="modal-price" class="text-3xl font-black text-red-custom"></p>
                    </div>
                    <a id="wa-link" href="#" class="block w-full mt-8 bg-red-custom text-white text-center p-4 rounded-xl font-bold shadow-xl">اطلب عبر واتساب</a>
                </div>
            </div>
        </div>
    </div>

    <!-- نافذة تسجيل الدخول (للأدمن) -->
    <div id="loginModal" class="modal">
        <div class="modal-content max-w-sm p-10 text-center">
            <div class="close-btn" onclick="this.parentElement.parentElement.style.display='none'">✕</div>
            <h2 class="text-2xl font-black text-red-custom mb-6">دخول المدير</h2>
            <input type="email" id="email" placeholder="البريد الإلكتروني" class="glass-input">
            <input type="password" id="password" placeholder="كلمة المرور" class="glass-input">
            <button onclick="login()" class="w-full bg-red-custom p-4 rounded-xl font-bold mt-4">تسجيل الدخول</button>
        </div>
    </div>

    <!-- نافذة رفع لوحة جديدة -->
    <div id="uploadModal" class="modal">
        <div class="modal-content max-w-lg p-10">
            <div class="close-btn" onclick="this.parentElement.parentElement.style.display='none'">✕</div>
            <h2 class="text-2xl font-black text-red-custom mb-8 text-center">نشر عمل فني جديد</h2>
            <div id="upStatus" class="hidden bg-blue-600 p-2 text-xs text-center mb-4 rounded-lg">جاري الرفع...</div>
            <input type="text" id="title" placeholder="اسم اللوحة" class="glass-input">
            <select id="category" class="glass-input"><option value="oil">زيتي</option><option value="mural">جداريات</option><option value="lead">رصاص</option><option value="kids">روضات</option></select>
            <input type="text" id="price" placeholder="السعر" class="glass-input">
            <input type="text" id="size" placeholder="القياس" class="glass-input">
            <textarea id="desc" placeholder="وصف العمل (اختياري)" class="glass-input h-24"></textarea>
            <input type="file" id="file" class="block w-full text-xs mb-6">
            <button onclick="uploadArt()" id="upBtn" class="w-full bg-green-600 p-4 rounded-xl font-black text-lg">نشر الآن</button>
        </div>
    </div>

    <script>
        // --- تهيئة Firebase ببياناتك ---
        const firebaseConfig = {
            apiKey: "AIzaSyDPLdyIpzU-IAovzrWqvH-mJNneP8W2nOA",
            authDomain: "ameer-5ad16.firebaseapp.com",
            projectId: "ameer-5ad16",
            storageBucket: "ameer-5ad16.firebasestorage.app",
            messagingSenderId: "819681497602",
            appId: "1:819681497602:web:ea755095b3a0c178dd8d1b"
        };
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.firestore();
        const storage = firebase.storage();

        const MY_PHONE = "9647829558820";
        const ADMIN_EMAIL = "ضع_بريدك_هنا@gmail.com"; // قم بتغيير هذا البريد!

        // مراقبة الدخول
        auth.onAuthStateChanged(user => {
            if (user && user.email === ADMIN_EMAIL) {
                document.querySelectorAll('.admin-only').forEach(el => el.style.display = 'block');
                document.getElementById('loginBtn').style.display = 'none';
            }
        });

        async function login() {
            try {
                await auth.signInWithEmailAndPassword(document.getElementById('email').value, document.getElementById('password').value);
                location.reload();
            } catch(e) { alert("خطأ في البيانات!"); }
        }
        function logout() { auth.signOut(); location.reload(); }

        // رفع عمل فني
        async function uploadArt() {
            const file = document.getElementById('file').files[0];
            const title = document.getElementById('title').value;
            if(!file || !title) return alert("اختر صورة واكتب اسماً للوحة");
            
            const upBtn = document.getElementById('upBtn');
            const upStatus = document.getElementById('upStatus');
            upBtn.disabled = true; upStatus.classList.remove('hidden');

            try {
                const path = `gallery/${Date.now()}_${file.name}`;
                const ref = storage.ref(path);
                await ref.put(file);
                const url = await ref.getDownloadURL();

                await db.collection('artworks').add({
                    title, url, path,
                    category: document.getElementById('category').value,
                    price: document.getElementById('price').value,
                    size: document.getElementById('size').value,
                    desc: document.getElementById('desc').value,
                    createdAt: firebase.firestore.FieldValue.serverTimestamp()
                });
                location.reload();
            } catch(e) { alert("فشل الرفع!"); upBtn.disabled = false; }
        }

        // جلب الأعمال
        let artworks = [];
        async function loadData() {
            const snap = await db.collection('artworks').orderBy('createdAt', 'desc').get();
            artworks = snap.docs.map(doc => ({id: doc.id, ...doc.data()}));
            renderGallery('all');
        }

        function renderGallery(cat) {
            const grid = document.getElementById('dynamicGallery');
            grid.innerHTML = "";
            const filtered = cat === 'all' ? artworks : artworks.filter(a => a.category === cat);
            
            filtered.forEach(art => {
                grid.innerHTML += `
                    <div class="work-item show glass-card rounded-[2rem] overflow-hidden group">
                        <img src="${art.url}" onclick="openPreview('${art.id}')" class="w-full h-48 object-cover rounded-t-[2rem]">
                        <div class="p-3 text-center">
                            <p class="text-[10px] font-bold">${art.title}</p>
                            <button onclick="deleteArt('${art.id}', '${art.path}')" class="admin-only text-red-500 text-[8px] mt-2 underline">حذف اللوحة</button>
                        </div>
                    </div>`;
            });
            // تفعيل أزرار الأدمن بعد الرندر
            if (auth.currentUser && auth.currentUser.email === ADMIN_EMAIL) {
                document.querySelectorAll('.admin-only').forEach(el => el.style.display = 'block');
            }
        }

        function openPreview(id) {
            const art = artworks.find(a => a.id === id);
            document.getElementById('modal-img').src = art.url;
            document.getElementById('modal-title').innerText = art.title;
            document.getElementById('modal-desc').innerText = art.desc || "عمل فني احترافي بريشة أمير عايد.";
            document.getElementById('modal-size').innerText = art.size ? "📏 القياس: " + art.size : "";
            document.getElementById('modal-price').innerText = art.price ? "💰 السعر: " + art.price : "";
            document.getElementById('wa-link').href = `https://wa.me/${MY_PHONE}?text=${encodeURIComponent('أود طلب اللوحة: ' + art.title)}`;
            document.getElementById('imageModal').style.display = 'flex';
        }

        async function deleteArt(id, path) {
            if(confirm("حذف اللوحة نهائياً؟")) {
                await db.collection('artworks').doc(id).delete();
                await storage.ref(path).delete();
                location.reload();
            }
        }

        function filterArt(cat) {
            document.querySelectorAll('.cat-btn').forEach(b => b.classList.replace('bg-red-custom', 'bg-white/5'));
            renderGallery(cat);
        }

        function openFlashDetail() {
            openSingleItem('تحفة العصر الروماني (1984)', 'ha5.jpg', '70 × 120 سم', '200$', 'لوحة رومانية قد تعود إلى الرسام الروماني عام 1984، قطعة فنية فريدة تعكس دقة الفن الكلاسيكي وتاريخه العريق.');
        }

        function openSingleItem(title, img, size, price, desc) {
            document.getElementById('modal-img').src = img;
            document.getElementById('modal-title').innerText = title;
            document.getElementById('modal-desc').innerText = desc;
            document.getElementById('modal-size').innerText = "📏 " + size;
            document.getElementById('modal-price').innerText = "💰 " + price;
            document.getElementById('imageModal').style.display = 'flex';
        }

        function closeModal() { document.getElementById('imageModal').style.display = 'none'; }
        loadData();
    </script>
    <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
    <script>AOS.init();</script>
</body>
</html>
