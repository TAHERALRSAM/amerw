<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>مرسم أمير عايد | المعرض الاحترافي</title>
    
    <!-- Firebase SDKs -->
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-firestore-compat.js"></script>

    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700;900&display=swap" rel="stylesheet">
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">

    <style>
        body { font-family: 'Tajawal', sans-serif; background-color: #050811; color: white; scroll-behavior: smooth; overflow-x: hidden; }
        .hero-section { background-image: linear-gradient(to bottom, rgba(5, 8, 17, 0.6), rgba(5, 8, 17, 0.98)), url('hero.jpg'); background-size: cover; background-position: center; min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; padding: 100px 20px; }
        .text-red-custom { color: #ef4444; }
        .bg-red-custom { background-color: #ef4444; }
        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.98); z-index: 2000; align-items: center; justify-content: center; padding: 10px; overflow-y: auto; }
        .modal-content { background: #0c0c0c; border: 1px solid #333; width: 100%; max-width: 950px; max-height: 95vh; border-radius: 28px; position: relative; overflow-y: auto; animation: zoomIn 0.3s ease; }
        .close-btn { position: absolute; top: 15px; left: 15px; background: #ef4444; color: white; width: 45px; height: 45px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: bold; z-index: 2100; cursor: pointer; border: 2px solid white; box-shadow: 0 0 20px rgba(239, 68, 68, 0.6); }
        .admin-only { display: none; }
        .glass-input { background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); border-radius: 12px; padding: 12px; width: 100%; outline: none; color: white; margin-bottom: 10px; text-align: right; }
        .name-glow { text-shadow: 0 0 40px rgba(239, 68, 68, 0.6); font-size: clamp(3.5rem, 12vw, 8.5rem); }
        .nav-bar { display: flex; align-items: center; justify-content: center; gap: 30px; padding: 15px; background: rgba(255,255,255,0.03); }
        .nav-btn { background: #ef4444; color: white; width: 40px; height: 40px; border-radius: 10px; display: flex; align-items: center; justify-content: center; cursor: pointer; }
    </style>
</head>
<body>

    <!-- القائمة العلوية -->
    <nav class="fixed w-full top-0 z-[150] bg-black/90 backdrop-blur-xl p-4 border-b border-white/5 flex justify-between items-center px-4">
        <div class="text-2xl font-black text-red-custom tracking-tighter">أمير عايد</div>
        <button onclick="openOrderModal()" class="bg-red-custom text-white px-5 py-2 rounded-xl font-bold text-xs shadow-lg">طلب رسم خاص ✨</button>
    </nav>

    <!-- الهيرو -->
    <header class="hero-section">
        <div data-aos="fade-up">
            <h1 class="font-black text-white name-glow leading-tight">أمير <span class="text-red-custom">عايد</span></h1>
            <p class="text-lg md:text-2xl font-bold mb-10 italic bg-black/40 px-8 py-2 rounded-full inline-block mt-4">فنٌ يملأ الفراغ.. ودقة تحاكي الواقع ✨</p>
            
            <div class="admin-only mb-10 bg-green-600/10 border border-green-600/30 p-6 rounded-[2.5rem]">
                <button onclick="document.getElementById('uploadModal').style.display='flex'" class="bg-green-600 text-white px-10 py-3 rounded-2xl font-black shadow-xl hover:bg-green-700 transition">➕ رفع صور (فردي أو مجموعة)</button>
            </div>

            <!-- عرض الفلاش سال (تلقائي) -->
            <div id="flash-sale-area" class="hidden flash-box rounded-[2.5rem] p-6 max-w-xl mx-auto text-right border-2 border-red-custom bg-red-600/5 cursor-pointer" onclick="openFlashDetail()">
                <div class="flex flex-col md:flex-row gap-6 items-center">
                    <img src="ha5.jpg" class="w-32 h-32 object-cover rounded-2xl border-2 border-red-custom shadow-xl">
                    <div class="flex-1 text-right">
                        <h3 class="text-red-custom font-black text-[10px] mb-1 uppercase tracking-widest">🔥 عرض فلاش محدود</h3>
                        <h2 class="text-xl font-bold text-white mb-2">تحفة العصر الروماني (1984)</h2>
                        <div class="flex items-center gap-4">
                            <span class="text-4xl font-black text-white">200$</span>
                            <span class="line-through text-gray-600 text-sm">250$</span>
                        </div>
                        <div id="timer" class="text-[11px] font-mono font-bold text-red-custom bg-black/50 p-2 rounded-lg inline-block mt-3 border border-red-custom/20"></div>
                    </div>
                </div>
            </div>
        </div>
    </header>

    <!-- المعرض والفلاتر -->
    <section class="max-w-7xl mx-auto px-6 py-20 text-right">
        <div id="filterButtons" class="flex flex-wrap justify-center gap-3 mb-16">
            <button onclick="filterArt('all')" class="cat-btn bg-red-custom px-8 py-2.5 rounded-2xl font-black text-sm text-white">الكل</button>
        </div>

        <div id="dynamicGallery" class="grid grid-cols-2 md:grid-cols-4 lg:grid-cols-5 gap-6 text-center">
            <div class="col-span-full py-20 text-gray-600 animate-pulse">جاري جلب لوحاتك...</div>
        </div>
    </section>

    <!-- Footer السري -->
    <footer class="py-20 border-t border-white/5 text-center">
        <div class="flex items-center justify-center gap-2 text-gray-800 hover:text-red-900 transition cursor-pointer" onclick="document.getElementById('loginModal').style.display='flex'">
            <span class="w-8 h-8 border border-current rounded-full flex items-center justify-center font-bold italic">P</span>
            <span class="text-sm font-bold">طاهر</span>
        </div>
    </footer>

    <!-- Modal الرفع المطور (يشمل كل الخانات) -->
    <div id="uploadModal" class="modal">
        <div class="modal-content max-w-lg p-10 border-green-600 border-2">
            <div class="close-btn" onclick="this.parentElement.parentElement.style.display='none'">✕</div>
            <h2 class="text-2xl font-black text-green-500 mb-8 text-center underline">نشر أعمال فنية جديدة</h2>
            
            <div id="batchStatus" class="hidden bg-blue-600 text-white p-3 text-xs text-center mb-6 rounded-xl font-bold italic animate-pulse"></div>

            <input type="text" id="artTitle" placeholder="اسم اللوحة (أو اسم المجموعة)" class="glass-input">
            <input type="text" id="artCategory" list="categoriesList" placeholder="القسم (زيتي، روضات، جداريات...)" class="glass-input">
            <datalist id="categoriesList"><option value="زيتي"><option value="جداريات"><option value="رصاص"><option value="روضات"></datalist>
            
            <input type="text" id="artPrice" placeholder="السعر" class="glass-input">
            <input type="text" id="artSize" placeholder="القياس (مثلاً: 70x120)" class="glass-input">
            <textarea id="artDesc" placeholder="تفاصيل اللوحة / كليشة القسم" class="glass-input h-32"></textarea>

            <div class="bg-white/5 p-6 rounded-2xl mb-8 border border-white/10 text-center">
                <label class="block text-gray-400 text-xs mb-4 italic">يمكنك اختيار صورة واحدة أو مجموعة صور:</label>
                <input type="file" id="artFiles" multiple class="block w-full text-xs text-gray-500 file:bg-green-600 file:text-white file:px-4 file:py-2 file:rounded-xl file:border-none cursor-pointer">
            </div>
            
            <button onclick="uploadBatchArtworks()" id="upBtn" class="w-full bg-green-600 p-5 rounded-2xl font-black text-xl hover:bg-green-700 transition shadow-xl shadow-green-600/20">بدء الرفع الآن</button>
        </div>
    </div>

    <!-- Modal عرض اللوحات -->
    <div id="imageModal" class="modal">
        <div class="modal-content shadow-2xl">
            <div class="close-btn" onclick="closeModal()">✕</div>
            <div class="flex flex-col md:flex-row">
                <div class="relative w-full md:w-3/5 bg-black h-[400px] md:h-[650px] flex items-center justify-center border-l border-white/5">
                    <img id="modal-img" src="" class="max-w-full max-h-full object-contain">
                    <div id="nav-controls" class="absolute bottom-0 left-0 w-full nav-bar hidden">
                        <div class="nav-btn" onclick="changeImage(1)">←</div>
                        <span id="img-counter" class="text-white font-bold text-xs"></span>
                        <div class="nav-btn" onclick="changeImage(-1)">→</div>
                    </div>
                </div>
                <div class="w-full md:w-2/5 p-10 text-right overflow-y-auto max-h-[400px] md:max-h-[650px]">
                    <h2 id="modal-title" class="text-3xl font-black text-red-custom mb-6"></h2>
                    <p id="modal-desc" class="text-gray-300 text-sm leading-relaxed mb-8 border-r-2 border-red-custom pr-4 italic font-bold"></p>
                    <div id="info-box" class="bg-white/5 p-6 rounded-3xl space-y-4">
                        <p id="modal-size" class="text-white font-bold text-lg"></p>
                        <p id="modal-price" class="text-4xl font-black text-red-custom"></p>
                    </div>
                    <a id="wa-link" href="#" class="block w-full mt-10 bg-red-custom text-white text-center p-5 rounded-2xl font-black text-lg">اطلب عبر واتساب</a>
                </div>
            </div>
        </div>
    </div>

    <!-- المودالات الأخرى (تسجيل دخول، طلب رسم) -->
    <div id="loginModal" class="modal"><div class="modal-content max-w-sm p-10 text-center"><div class="close-btn" onclick="this.parentElement.parentElement.style.display='none'">✕</div><h2 class="text-xl font-black text-red-custom mb-6 italic">تـحـقـق</h2><input type="email" id="email" placeholder="البريد" class="glass-input"><input type="password" id="password" placeholder="كلمة السر" class="glass-input"><button onclick="login()" class="w-full bg-red-custom p-4 rounded-xl font-black mt-4 text-white">دخول</button></div></div>
    
    <div id="orderModal" class="modal"><div class="modal-content max-w-lg p-10"><div class="close-btn" onclick="this.parentElement.parentElement.style.display='none'">✕</div><h2 class="text-2xl font-black text-red-custom mb-6 text-center">طلب رسم شخصي</h2><form onsubmit="handleOrderRequest(event)"><select id="orderType" class="glass-input"><option>رصاص</option><option>زيتي</option><option>أكريليك</option></select><input type="tel" id="orderPhone" placeholder="رقم الهاتف" class="glass-input" required><input type="file" id="orderFile" accept="image/*" class="text-xs mb-8 block"><button type="submit" class="w-full bg-red-custom p-4 rounded-xl font-black text-white">إرسال الطلب</button></form></div></div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyD0g9fQAHVKLfdwUTFzsRvgd_ejXKgDMZM",
            authDomain: "artt2001-47518.firebaseapp.com",
            projectId: "artt2001-47518",
            storageBucket: "artt2001-47518.firebasestorage.app",
            messagingSenderId: "254647132198",
            appId: "1:254647132198:web:42e0e71b3b9443ab9dc6e7"
        };
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.firestore();

        const MY_PHONE = "9647829558820";
        const ADMIN_EMAIL = "taheralrsam100@gmail.com";
        const IMGBB_KEY = "2992948833d81d6dc8555d60cdd13431"; // الـ API الجديد

        let artworks = [];
        let currentGroup = [];
        let currentIndex = 0;

        auth.onAuthStateChanged(user => {
            if (user && user.email === ADMIN_EMAIL) {
                document.querySelectorAll('.admin-only').forEach(el => el.style.display = 'block');
            }
        });

        async function login() {
            try {
                await auth.signInWithEmailAndPassword(document.getElementById('email').value, document.getElementById('password').value);
                location.reload();
            } catch(e) { alert("بيانات الدخول خطأ!"); }
        }
        function logout() { auth.signOut(); location.reload(); }

        // --- الرفع المتعدد المطور ---
        async function uploadBatchArtworks() {
            const files = document.getElementById('artFiles').files;
            const title = document.getElementById('artTitle').value;
            const category = document.getElementById('artCategory').value;
            const price = document.getElementById('artPrice').value;
            const size = document.getElementById('artSize').value;
            const desc = document.getElementById('artDesc').value;

            if (files.length === 0 || !title || !category) return alert("يرجى إكمال الاسم والقسم واختيار الصور");

            const upBtn = document.getElementById('upBtn');
            const statusDiv = document.getElementById('batchStatus');
            upBtn.disabled = true; statusDiv.classList.remove('hidden');

            for (let i = 0; i < files.length; i++) {
                statusDiv.innerText = `جاري رفع الصورة (${i + 1} من أصل ${files.length})...`;
                try {
                    const fd = new FormData(); fd.append("image", files[i]);
                    const r = await fetch(`https://api.imgbb.com/1/upload?key=${IMGBB_KEY}`, { method: "POST", body: fd });
                    const d = await r.json();
                    
                    if (d.success) {
                        await db.collection('artworks').add({
                            title: files.length > 1 ? `${title} (${i + 1})` : title,
                            category, price, size, desc,
                            group: title, // يربطهم تلقائياً في مجموعة واحدة لتسهيل التنقل
                            url: d.data.url,
                            createdAt: firebase.firestore.FieldValue.serverTimestamp()
                        });
                    }
                } catch (e) { console.error(e); }
            }
            alert("تم الرفع بنجاح!");
            location.reload();
        }

        // --- جلب البيانات ---
        async function loadData() {
            const snap = await db.collection('artworks').orderBy('createdAt', 'desc').get();
            artworks = snap.docs.map(doc => ({id: doc.id, ...doc.data()}));
            
            // صنع أزرار الفلتر تلقائياً
            const cats = [...new Set(artworks.map(a => a.category))];
            const filterDiv = document.getElementById('filterButtons');
            cats.forEach(c => {
                if(c) filterDiv.innerHTML += `<button onclick="filterArt('${c}')" class="cat-btn bg-white/5 px-8 py-2.5 rounded-2xl font-bold text-sm text-gray-400 hover:bg-white/10 transition">${c}</button>`;
            });

            renderGallery('all');
        }

        function renderGallery(cat) {
            const grid = document.getElementById('dynamicGallery');
            grid.innerHTML = "";
            const filtered = cat === 'all' ? artworks : artworks.filter(a => a.category === cat);
            
            filtered.forEach(art => {
                grid.innerHTML += `
                    <div class="glass-card rounded-[2.2rem] overflow-hidden">
                        <img src="${art.url}" onclick="openPreview('${art.id}')" class="w-full h-48 md:h-56 object-cover cursor-pointer">
                        <div class="p-3 text-center">
                            <p class="text-[10px] font-bold text-gray-400">${art.title}</p>
                            <button onclick="deleteArt('${art.id}')" class="admin-only text-red-500 text-[8px] mt-2 underline font-black">حذف نهائي</button>
                        </div>
                    </div>`;
            });
            if (auth.currentUser && auth.currentUser.email === ADMIN_EMAIL) {
                document.querySelectorAll('.admin-only').forEach(el => el.style.display = 'block');
            }
        }

        function openPreview(id) {
            const art = artworks.find(a => a.id === id);
            if(art.group && art.group !== "") {
                currentGroup = artworks.filter(a => a.group === art.group);
                currentIndex = currentGroup.findIndex(a => a.id === id);
                document.getElementById('nav-controls').classList.remove('hidden');
                document.getElementById('nav-controls').classList.add('flex');
            } else {
                currentGroup = [art]; currentIndex = 0;
                document.getElementById('nav-controls').classList.add('hidden');
            }
            updateModalUI();
            document.getElementById('imageModal').style.display = 'flex';
            document.body.style.overflow = 'hidden';
        }

        function updateModalUI() {
            const art = currentGroup[currentIndex];
            document.getElementById('modal-img').src = art.url;
            document.getElementById('modal-title').innerText = art.title;
            
            // الكليشة التلقائية إذا لم يوجد وصف
            let klisha = art.desc;
            if(!klisha) {
                if(art.category === 'جداريات') klisha = "نحول جدرانكم الصامتة إلى لوحات تنبض بالحياة بدقة المنظور الهندسي.";
                else if(art.category === 'رصاص') klisha = "الرصاص.. لغة الظل والنور التي تخلد الملامح بواقعية فائقة.";
                else if(art.category === 'روضات') klisha = "عالم من الألوان والبهجة لروضاتكم! ✨ حكايات خيالية مبهجة.";
                else klisha = "عمل فني احترافي بريشة أمير عايد.";
            }

            document.getElementById('modal-desc').innerText = klisha;
            document.getElementById('modal-size').innerText = art.size ? "📏 القياس: " + art.size : "";
            document.getElementById('modal-price').innerText = art.price ? "💰 السعر: " + art.price : "💰 تواصل للتفاصيل";
            document.getElementById('img-counter').innerText = `${currentIndex + 1} / ${currentGroup.length}`;
            document.getElementById('wa-link').href = `https://wa.me/${MY_PHONE}?text=${encodeURIComponent('أود طلب: ' + art.title)}`;
        }

        function changeImage(n) { currentIndex = (currentIndex + n + currentGroup.length) % currentGroup.length; updateModalUI(); }
        async function deleteArt(id) { if(confirm("حذف نهائياً؟")) { await db.collection('artworks').doc(id).delete(); location.reload(); } }
        function closeModal() { document.getElementById('imageModal').style.display = 'none'; document.body.style.overflow = 'auto'; }
        function filterArt(c) { renderGallery(c); }

        // فلاش سال
        function runFlash() {
            const elapsed = (Date.now() - new Date('2024-01-01').getTime()) % (13 * 24 * 60 * 60 * 1000);
            const idx = Math.floor(elapsed / (48 * 60 * 60 * 1000));
            if(idx < 5) {
                document.getElementById('flash-sale-area').classList.remove('hidden');
                const timeLeft = (48 * 60 * 60 * 1000) - (elapsed % (48 * 60 * 60 * 1000));
                const h = Math.floor(timeLeft / 3600000);
                const m = Math.floor((timeLeft % 3600000) / 60000);
                const s = Math.floor((timeLeft % 60000) / 1000);
                document.getElementById('timer').innerText = `ينتهي العرض: ${h}س ${m}د ${s}ث`;
            } else { document.getElementById('flash-sale-area').classList.add('hidden'); }
        }
        setInterval(runFlash, 1000); runFlash();
        loadData();
    </script>
</body>
</html>
