<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>مرسم أمير | المعرض الشخصي</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700;900&display=swap" rel="stylesheet">
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">
    <style>
        body { font-family: 'Tajawal', sans-serif; background-color: #050811; color: white; scroll-behavior: smooth; }
        .hero-section {
            /* هنا الكود يقرأ صورة الواجهة */
            background-image: linear-gradient(to bottom, rgba(5, 8, 17, 0.7), rgba(5, 8, 17, 1)), url('hero.jpg');
            background-size: cover; background-position: center; background-attachment: fixed;
            height: 70vh; display: flex; align-items: center; justify-content: center; text-align: center;
        }
        .glass-card {
            background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.1); transition: 0.4s; overflow: hidden;
        }
        .glass-card:hover { border-color: #8b5cf6; transform: translateY(-10px); }
        .category-btn { background: rgba(255, 255, 255, 0.05); padding: 10px 20px; border-radius: 12px; cursor: pointer; transition: 0.3s; }
        .category-btn.active { background: #8b5cf6; box-shadow: 0 0 15px rgba(139, 92, 246, 0.5); }
        .work-item { display: none; }
        .work-item.show { display: block; animation: fadeInUp 0.5s ease forwards; }
        @keyframes fadeInUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

    <nav class="fixed w-full z-50 bg-black/50 backdrop-blur-md p-4 border-b border-white/5">
        <div class="max-w-7xl mx-auto flex justify-between items-center">
            <div class="text-2xl font-black text-purple-500">مرسم أمير</div>
            <button class="bg-purple-600 px-5 py-2 rounded-full font-bold text-sm">تواصل معي</button>
        </div>
    </nav>

    <header class="hero-section">
        <div data-aos="zoom-in">
            <h1 class="text-6xl font-black mb-4">مرسم <span class="text-purple-500">أمير</span></h1>
            <p class="text-xl text-gray-300 italic">فن يحاكي الواقع بريشة الإبداع</p>
        </div>
    </header>

    <section class="max-w-7xl mx-auto px-6 py-20">
        <div class="flex flex-wrap justify-center gap-4 mb-16">
            <button onclick="filterArt('all')" id="all-btn" class="category-btn active">الكل</button>
            <button onclick="filterArt('oil')" id="oil-btn" class="category-btn">الرسم الزيتي</button>
            <button onclick="filterArt('cafe')" id="cafe-btn" class="category-btn">جداريات كوفيات</button>
            <button onclick="filterArt('portrait')" id="portrait-btn" class="category-btn">رسم البورتريه</button>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-2 gap-10">
            <div class="work-item show oil" data-aos="fade-up">
                <div class="glass-card rounded-[2rem]">
                    <img src="owl.jpg" class="w-full h-[500px] object-cover">
                    <div class="p-8"><h3 class="text-2xl font-bold mb-2">لوحة البومة</h3></div>
                </div>
            </div>
            <div class="work-item show cafe" data-aos="fade-up">
                <div class="glass-card rounded-[2rem]">
                    <img src="face.jpg" class="w-full h-[500px] object-cover">
                    <div class="p-8"><h3 class="text-2xl font-bold mb-2">بورتريه عصري</h3></div>
                </div>
            </div>
            <div class="work-item show oil portrait" data-aos="fade-up">
                <div class="glass-card rounded-[2rem]">
                    <img src="history.jpg" class="w-full h-[500px] object-cover">
                    <div class="p-8"><h3 class="text-2xl font-bold mb-2">لوحة تراثية</h3></div>
                </div>
            </div>
            <div class="work-item show portrait" data-aos="fade-up">
                <div class="glass-card rounded-[2rem]">
                    <img src="kazem.jpg" class="w-full h-[500px] object-cover">
                    <div class="p-8"><h3 class="text-2xl font-bold mb-2">لوحة القيصر</h3></div>
                </div>
            </div>
        </div>
    </section>

    <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
    <script>
        AOS.init();
        function filterArt(category) {
            document.querySelectorAll('.category-btn').forEach(btn => btn.classList.remove('active'));
            document.getElementById(category + '-btn').classList.add('active');
            document.querySelectorAll('.work-item').forEach(item => {
                if (category === 'all' || item.classList.contains(category)) item.classList.add('show');
                else item.classList.remove('show');
            });
        }
    </script>
</body>
</html>
